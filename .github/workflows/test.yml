name: Test

# Single-purpose, reusable (workflow_call): the unit + integration suites across
# the supported matrix (OS x Node), where cross-environment bugs actually surface.
# The matrix earns its cost here (unlike biome/typecheck) — package.json
# `engines: node >=20`. Integration tests are hermetic (nock; no network).
# Coverage runs once, informational and non-blocking.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22, 24]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Coverage (informational, non-blocking)
        if: matrix.os == 'ubuntu-latest' && matrix.node == 24
        continue-on-error: true
        run: pnpm run test:coverage
