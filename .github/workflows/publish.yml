name: Publish Package

# Publishes ebay-mcp to npm via OIDC trusted publishing (no NPM_TOKEN).
# Mirrors the universal-agent-toolkit publish workflow. The workflow filename
# `publish.yml` must stay aligned with the npm Trusted Publisher configuration
# for the `ebay-mcp` package (changing the filename invalidates the OIDC match).
#
# Triggers:
#   - push of a v*.*.* tag (manual `git push --tags` / external)
#   - workflow_run after Release completes (GITHUB_TOKEN-pushed tags do not
#     fire `push:tags` in downstream workflows; this is the bridge)
#   - workflow_dispatch (manual recovery, e.g. publish an existing tag)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_run:
    workflows: ['Release']
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v1.8.8). Defaults to main HEAD.'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      INPUT_TAG: ${{ inputs.tag }}
    steps:
      - name: Resolve checkout ref
        id: ref
        run: |
          case "$GITHUB_EVENT_NAME" in
            workflow_dispatch)
              if [ -n "$INPUT_TAG" ]; then
                echo "ref=$INPUT_TAG" >> "$GITHUB_OUTPUT"
              else
                echo "ref=main" >> "$GITHUB_OUTPUT"
              fi
              ;;
            workflow_run)
              echo "ref=main" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ref=$GITHUB_REF" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Verify npm supports OIDC Trusted Publishing
        run: |
          test "$(printf '%s\n' "11.5.1" "$(npm -v)" | sort -V | head -1)" = "11.5.1" || {
            echo "::error::npm $(npm -v) is below 11.5.1; trusted publishing is not supported"
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: ppnpm typecheck

      - name: Run tests
        run: ppnpm test

      - name: Build
        run: ppnpm build

      - name: Publish to npm (trusted publishing)
        run: pnpm publish --no-git-checks --access public --provenance
