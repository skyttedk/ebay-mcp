name: Report failure

# Reusable (workflow_call): open (or comment on) a `ci-failure` issue with the
# failing job's captured log tail, so the error is readable straight from the
# issue — no Actions-log streaming. The gate calls this only on a main failure.
# See docs/adr/current/0004-ci-workflow-architecture.md.

on:
  workflow_call:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  report-failure:
    name: File or update a ci-failure issue
    runs-on: ubuntu-latest
    steps:
      - name: File or update a ci-failure issue with the captured error
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);
            const label = 'ci-failure';

            // Enumerate jobs; keep the ones that actually failed.
            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner, repo, run_id: context.runId, per_page: 100,
            });
            const failed = jobs.filter((j) => j.conclusion && !['success', 'skipped'].includes(j.conclusion));

            // Pull the tail of each failed job's log so the exact error is readable
            // straight from the issue. The matrix legs share one root cause, so a
            // few truncated tails are enough.
            const MAX_JOBS = 3, TAIL_LINES = 60, MAX_CHARS = 3000;
            const tailOf = async (job) => {
              try {
                const res = await github.request('GET /repos/{owner}/{repo}/actions/jobs/{job_id}/logs', {
                  owner, repo, job_id: job.id,
                });
                const text = typeof res.data === 'string' ? res.data : Buffer.from(res.data).toString('utf8');
                // Drop each line's leading ISO timestamp for readability, then keep the tail.
                const lines = text.split('\n').map((l) => l.replace(/^\S+\s/, '')).filter((l) => l.trim());
                let tail = lines.slice(-TAIL_LINES).join('\n');
                if (tail.length > MAX_CHARS) tail = `...(truncated)...\n${tail.slice(-MAX_CHARS)}`;
                return tail || '(no log output captured)';
              } catch (e) {
                return `(could not fetch job log: ${e.message})`;
              }
            };

            const sections = [];
            for (const job of failed.slice(0, MAX_JOBS)) {
              sections.push(`### \`${job.name}\` -> **${job.conclusion}**\n\n\`\`\`text\n${await tailOf(job)}\n\`\`\``);
            }
            const overflow = failed.length > MAX_JOBS
              ? `\n_+${failed.length - MAX_JOBS} more failed leg(s): ${failed.slice(MAX_JOBS).map((j) => `\`${j.name}\``).join(', ')}._`
              : '';

            // Ensure the label exists (idempotent across runs).
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch {
              await github.rest.issues.createLabel({
                owner, repo, name: label, color: 'b60205',
                description: 'Automated CI failure on main',
              });
            }

            const title = `CI failed on main @ ${shortSha}`;
            const body = [
              '**Main CI failed** after a push to `main`. The captured error output is below —',
              'fix straight from here; the run link has exit codes + full context if needed.',
              '',
              `- Commit: \`${context.sha}\``,
              `- Run: ${runUrl}`,
              '',
              failed.length ? sections.join('\n\n') : '_Could not enumerate jobs — open the run above._',
              overflow,
              '',
              'Close this issue once `main` is green again.',
            ].join('\n');

            // Dedupe: comment on an existing open issue for the same commit instead of spamming.
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: label, per_page: 100,
            });
            const existing = open.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number,
                body: `Still failing — re-run: ${runUrl}\n\n${sections.join('\n\n')}`,
              });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: [label] });
            }
