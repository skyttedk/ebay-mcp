name: E2E

# Single-purpose, reusable (workflow_call): the end-to-end suite. OPT-IN — it
# ships as a template but is NOT wired into ci.yml, because alg has no `test:e2e`
# script yet (it would run red). Once you add one, uncomment the `e2e:` job in
# ci.yml (`uses: ./.github/workflows/e2e.yml`) and the Chromium install step below
# (alg's scanner drives Playwright, so real E2E needs a browser).

on:
  workflow_call:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E tests
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Playwright: install the browser before the suite.
      # - name: Install Playwright browsers
      #   run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e
